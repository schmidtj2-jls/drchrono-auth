<!DOCTYPE html>
<html>
<head>
  <title>Signing in...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f5; }
    h2 { color: #333; }
    p { color: #666; }
    a.btn { display: inline-block; margin-top: 24px; padding: 14px 28px;
            background: #4f86f7; color: white; text-decoration: none;
            border-radius: 8px; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Completing sign-in...</h2>
  <p id="status">Returning you to the app...</p>
  <a id="fallback" class="btn" style="display:none" href="">Tap here to return to app</a>
  <script>
    var params = window.location.search;

    // Direct exp:// link — used as fallback button
    var expUrl = 'exp://192.168.50.191:8081/--/auth' + params;

    // Android Intent URL — tells Chrome to open Expo Go directly.
    // Chrome blocks automatic window.location = 'exp://...' redirects,
    // but Intent URLs are explicitly supported and never blocked.
    var intentUrl = 'intent://192.168.50.191:8081/--/auth' + params +
      '#Intent;scheme=exp;package=host.exp.exponent;end';

    document.getElementById('fallback').href = expUrl;

    setTimeout(function () {
      window.location = intentUrl;
      // If the app didn't open after 2s, show the manual tap button
      setTimeout(function () {
        document.getElementById('status').textContent =
          'If the app did not open automatically, tap the button below.';
        document.getElementById('fallback').style.display = 'inline-block';
      }, 2000);
    }, 500);
  </script>
</body>
</html>
